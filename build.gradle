buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Upgraded for better Java 21+ support
        classpath 'com.android.tools.build:gradle:8.5.2'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24'
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
